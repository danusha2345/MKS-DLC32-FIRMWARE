################################################################
# - 	            MKS DLC32 ESP32的默认参数设置
# - CPU Freq:160MHz         - for I2S calc
# - Flash Freq:80MHz        - for ESP32 Flash speed
# - Flash Mode: DOUT        - for ESP32 Flash mode
################################################################
[esp32_common]
platform = espressif32@3.2.0 
framework = arduino
board = esp32dev
board_build.f_cpu = 160000000L
board_build.f_flash = 80000000L
board_build.flash_mode = dout
; MKS DLC32 v2.1 несёт ESP32-WROOM-32U с 8 МБ flash
board_upload.flash_size = 8MB
board_build.flash_size = 8MB
build_unflags = -std=gnu++11
monitor_speed = 115200
; нативные unit-тесты гоняются только через `pio test -e native`;
; без этого голый `pio test` пытается собрать их под ESP32 и падает
test_ignore = test_sd_job_policy
build_flags = 
	-std=c++17
	-std=gnu++17
	-DCORE_DEBUG_LEVEL=0
	-Wno-unused-variable
	-Wno-unused-function
	-w							
build_src_filter = 
	+<*.h> +<*.s> +<*.S> +<*.cpp> +<*.c> +<*.ino> +<src/>
	-<.git/> -<data/> -<test/> -<tests/>

; For MKS DLC32
[env:mks_dlc32_v2_1]
platform = ${esp32_common.platform}
extends = esp32_common
board_build.partitions = esp32_8MiB.csv
upload_speed = 921600
build_flags = ${esp32_common.build_flags}
	-D MACHINE_TYPE_DEFAULT
	-D CONFIG_ESP_TASK_WDT_TIMEOUT_S=1
lib_deps = 
    TMCStepper@>=0.7.0,<1.0.0
	esp32async/AsyncTCP @ ^3.4.10
	adafruit/Adafruit MPR121 @ ^1.2.1

[env:mks_dlc32_v2_1_ota]
platform = ${esp32_common.platform}
extends = esp32_common
board_build.partitions = esp32_8MiB.csv
upload_protocol = espota
upload_port = 192.168.4.1
upload_flags = --port=3232
build_flags = ${esp32_common.build_flags}
	-D MACHINE_TYPE_DEFAULT
	-D CONFIG_ESP_TASK_WDT_TIMEOUT_S=1
lib_deps = 
    TMCStepper@>=0.7.0,<1.0.0
	esp32async/AsyncTCP @ ^3.4.10
	adafruit/Adafruit MPR121 @ ^1.2.1

